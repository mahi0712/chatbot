<!DOCTYPE html>
<html>
<head>
    <title>Chatbot</title>
</head>
<body>
    <h1>My Chatbot</h1>

    <form method="POST">
        <input type="text" name="user_input" placeholder="Type something..." required>
        <button type="submit">Send</button>
    </form>

    {% if response %}
        <p><b>Bot:</b> {{ response }}</p>
    {% endif %}
</body>
</html>
